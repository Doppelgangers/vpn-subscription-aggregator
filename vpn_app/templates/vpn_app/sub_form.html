{% extends 'vpn_app/base.html' %}

{% block title %}{{ title }} - VPN Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card p-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Название агрегатора</label>
                    {{ form.name }}
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Токен подписки (необязательно)</label>
                    {{ form.token }}
                    <p class="text-[10px] text-slate-400 mt-1">Оставьте пустым для автогенерации UUID</p>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
                        Создать
                    </button>
                    <a href="{% url 'dashboard' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-2 rounded-lg text-center transition">
                        Отмена
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
