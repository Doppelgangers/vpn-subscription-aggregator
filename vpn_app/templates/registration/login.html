{% extends 'vpn_app/base.html' %}

{% block title %}Вход - VPN Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto pt-12">
    <div class="card p-8">
        <div class="text-center mb-8">
            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="lock" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Вход в систему</h1>
            <p class="text-slate-500">Управляйте своими подписками</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Имя пользователя</label>
                    <input type="text" name="username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                {% if form.errors %}
                <p class="text-red-500 text-sm">Неверное имя пользователя или пароль</p>
                {% endif %}
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-200">
                    Войти
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
